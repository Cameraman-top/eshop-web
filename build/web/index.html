  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="eshop_flutter">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>eshop_flutter</title>
  <link rel="manifest" href="manifest.json">

  <script>
    // 不在 index.html 硬写 localStorage('API_BASE_URL'); 这种"覆盖式"写法
    // 会让 api_client.dart 的 _getBaseUrl() 永远读取被写死的旧值。
    // 让 dart 端 String.fromEnvironment 的 defaultValue 生效即可，那样改 URL 只需改一处。
    const serviceWorkerVersion = "3386298824";
  </script>
  <!-- This script adds the flutter initialization JS code -->
  <script src="flutter.js" defer></script>
</head>
<body>
  <script>
    window.addEventListener('load', function(ev) {
      // 主动卸载任何已注册的旧 service worker。
      // 此前部署注册过 SW 缓存了旧版 main.dart.js（其内部硬写 localStorage 走 localhost:8081），
      // 导致用户卡在旧版本上：每次 fetch 都被旧 SW 拦截去本地拿数据失败。
      // 这一次彻底放弃注册新 SW（去掉 loadEntrypoint 的 serviceWorker 字段），
      // 让 Flutter 不再写 SW，未来部署不再有 SW cache 中毒问题。
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(regs) {
          regs.forEach(function(r) { r.unregister(); });
        });
      }
      // Download main.dart.js — 不传 serviceWorker，flutter.js 不会注册 SW
      _flutter.loader.loadEntrypoint({
        onEntrypointLoaded: function(engineInitializer) {
          engineInitializer.initializeEngine().then(function(appRunner) {
            appRunner.runApp();
          });
        }
      });
    });
  </script>
</body>
</html>
