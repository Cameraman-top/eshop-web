name: Build iOS

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      export_method:
        description: "IPA export method"
        type: choice
        options:
          - ad-hoc
          - development
          - app-store
        default: ad-hoc

jobs:
  build-ios:
    name: Build iOS
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.16.9"
          channel: stable
          cache: true

      - name: Setup CocoaPods
        run: |
          pod --version || sudo gem install cocoapods

      - name: Install dependencies
        run: flutter pub get

      - name: Install CocoaPods
        working-directory: ios
        run: pod install

      - name: Build iOS (unsigned)
        if: ${{ !secrets.APPLE_CERTIFICATE_BASE64 }}
        run: flutter build ios --no-codesign --release

      - name: Upload Runner.app (unsigned)
        if: ${{ !secrets.APPLE_CERTIFICATE_BASE64 }}
        uses: actions/upload-artifact@v4
        with:
          name: ios-unsigned
          path: build/ios/iphoneos/Runner.app
          retention-days: 7

      - name: Setup code signing
        if: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
        env:
          CERT_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          CERT_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          PROFILE_BASE64: ${{ secrets.APPLE_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD || 'temp-keychain-pwd' }}
        run: |
          # Create temp keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychains -d user -s $KEYCHAIN_PATH

          # Import certificate
          echo "$CERT_BASE64" | base64 --decode > $RUNNER_TEMP/certificate.p12
          security import $RUNNER_TEMP/certificate.p12 \
            -k $KEYCHAIN_PATH \
            -P "$CERT_PASSWORD" \
            -A -T /usr/bin/codesign

          security set-key-partition-list -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # Install provisioning profile
          PROFILE_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILE_DIR"
          echo "$PROFILE_BASE64" | base64 --decode > "$PROFILE_DIR/profile.mobileprovision"

      - name: Build signed IPA
        if: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
        env:
          EXPORT_METHOD: ${{ github.event.inputs.export_method || 'ad-hoc' }}
        run: |
          # Generate ExportOptions.plist
          cat > ios/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>$EXPORT_METHOD</string>
            <key>teamID</key>
            <string>${{ secrets.APPLE_TEAM_ID }}</string>
          </dict>
          </plist>
          EOF

          flutter build ipa --release --export-options-plist=ios/ExportOptions.plist

      - name: Upload signed IPA
        if: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
        uses: actions/upload-artifact@v4
        with:
          name: ios-signed
          path: build/ios/ipa/*.ipa
          retention-days: 30
