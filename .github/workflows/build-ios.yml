name: Build iOS

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      export_method:
        description: "IPA export method"
        type: choice
        options:
          - ad-hoc
          - development
          - app-store
        default: ad-hoc

jobs:
  build-ios:
    name: Build iOS
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.16.9"
          channel: stable
          cache: true

      - name: Setup CocoaPods
        run: pod --version || sudo gem install cocoapods

      - name: Install dependencies
        run: flutter pub get

      - name: Install CocoaPods
        working-directory: ios
        run: pod install

      - name: Build iOS (unsigned)
        if: env.HAS_CERT != 'true'
        run: flutter build ios --no-codesign --release

      - name: Upload Runner.app (unsigned)
        if: env.HAS_CERT != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ios-unsigned
          path: build/ios/iphoneos/Runner.app
          retention-days: 7

      - name: Setup code signing
        if: env.HAS_CERT == 'true'
        env:
          CERT_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          CERT_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          PROFILE_BASE64: ${{ secrets.APPLE_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: temp-keychain-pwd
        run: |
          python3 << 'PYEOF'
          import os, base64, subprocess, tempfile

          # Decode certificate
          cert_b64 = os.environ['CERT_BASE64']
          cert_data = base64.b64decode(cert_b64)
          cert_path = os.path.join(os.environ['RUNNER_TEMP'], 'certificate.p12')
          with open(cert_path, 'wb') as f:
              f.write(cert_data)
          print(f"Certificate written: {len(cert_data)} bytes")

          # Decode provisioning profile
          prof_b64 = os.environ['PROFILE_BASE64']
          prof_data = base64.b64decode(prof_b64)
          prof_dir = os.path.expanduser('~/Library/MobileDevice/Provisioning Profiles')
          os.makedirs(prof_dir, exist_ok=True)
          prof_path = os.path.join(prof_dir, 'profile.mobileprovision')
          with open(prof_path, 'wb') as f:
              f.write(prof_data)
          print(f"Profile written: {len(prof_data)} bytes")

          # Create keychain
          kc_pwd = os.environ['KEYCHAIN_PASSWORD']
          kc_path = os.path.join(os.environ['RUNNER_TEMP'], 'app-signing.keychain-db')
          subprocess.run(['security', 'create-keychain', '-p', kc_pwd, kc_path], check=True)
          subprocess.run(['security', 'set-keychain-settings', '-lut', '21600', kc_path], check=True)
          subprocess.run(['security', 'unlock-keychain', '-p', kc_pwd, kc_path], check=True)
          subprocess.run(['security', 'list-keychains', '-d', 'user', '-s', kc_path], check=True)

          # Import certificate
          cert_pwd = os.environ['CERT_PASSWORD']
          subprocess.run(['security', 'import', cert_path, '-k', kc_path, '-P', cert_pwd, '-A', '-T', '/usr/bin/codesign'], check=True)
          subprocess.run(['security', 'set-key-partition-list', '-S', 'apple-tool:,apple:', '-s', '-k', kc_pwd, kc_path], check=True)

          print("Code signing ready!")
          PYEOF

      - name: Build signed IPA
        if: env.HAS_CERT == 'true'
        env:
          EXPORT_METHOD: ${{ github.event.inputs.export_method || 'ad-hoc' }}
        run: |
          cat > ios/ExportOptions.plist << 'PLISTEOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>${EXPORT_METHOD}</string>
            <key>teamID</key>
            <string>${{ secrets.APPLE_TEAM_ID }}</string>
          </dict>
          </plist>
          PLISTEOF
          flutter build ipa --release --export-options-plist=ios/ExportOptions.plist

      - name: Upload signed IPA
        if: env.HAS_CERT == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ios-signed
          path: build/ios/ipa/*.ipa
          retention-days: 30

    env:
      HAS_CERT: ${{ secrets.APPLE_CERTIFICATE_BASE64 != '' }}
