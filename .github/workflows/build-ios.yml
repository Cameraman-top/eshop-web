name: Build iOS

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      export_method:
        description: "IPA export method"
        type: choice
        options:
          - ad-hoc
          - development
          - app-store
        default: ad-hoc

jobs:
  build-ios:
    name: Build iOS
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.16.9"
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Install CocoaPods
        working-directory: ios
        run: pod install

      - name: Build iOS (unsigned)
        if: env.HAS_CERT != 'true'
        run: flutter build ios --no-codesign --release

      - name: Upload Runner.app (unsigned)
        if: env.HAS_CERT != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ios-unsigned
          path: build/ios/iphoneos/Runner.app
          retention-days: 7

      - name: Setup code signing
        if: env.HAS_CERT == 'true'
        env:
          DEV_CERT_BASE64: ${{ secrets.APPLE_DEV_CERTIFICATE_BASE64 }}
          DIST_CERT_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          CERT_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          PROFILE_BASE64: ${{ secrets.APPLE_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: temp-keychain-pwd
        run: |
          python3 << 'PYEOF'
          import os, base64, subprocess

          kc_pwd = os.environ['KEYCHAIN_PASSWORD']
          kc_path = os.path.join(os.environ['RUNNER_TEMP'], 'app-signing.keychain-db')
          subprocess.run(['security', 'create-keychain', '-p', kc_pwd, kc_path], check=True)
          subprocess.run(['security', 'set-keychain-settings', '-lut', '21600', kc_path], check=True)
          subprocess.run(['security', 'unlock-keychain', '-p', kc_pwd, kc_path], check=True)
          subprocess.run(['security', 'list-keychains', '-d', 'user', '-s', kc_path], check=True)

          cert_pwd = os.environ['CERT_PASSWORD']
          for b64_str, name in [(os.environ['DEV_CERT_BASE64'], 'dev'), (os.environ['DIST_CERT_BASE64'], 'dist')]:
              p = os.path.join(os.environ['RUNNER_TEMP'], f'{name}.p12')
              with open(p, 'wb') as f: f.write(base64.b64decode(b64_str))
              subprocess.run(['security', 'import', p, '-k', kc_path, '-P', cert_pwd, '-A', '-T', '/usr/bin/codesign'], check=True)

          subprocess.run(['security', 'set-key-partition-list', '-S', 'apple-tool:,apple:', '-s', '-k', kc_pwd, kc_path], check=True)

          prof_b64 = os.environ['PROFILE_BASE64']
          prof_dir = os.path.expanduser('~/Library/MobileDevice/Provisioning Profiles')
          os.makedirs(prof_dir, exist_ok=True)
          prof_path = os.path.join(prof_dir, 'eshop.mobileprovision')
          with open(prof_path, 'wb') as f: f.write(base64.b64decode(prof_b64))
          print(f"Profile installed: {os.path.getsize(prof_path)} bytes")
          print("Code signing ready!")
          PYEOF

      - name: Build signed IPA with xcodebuild
        if: env.HAS_CERT == 'true'
        env:
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          cd ios

          # Extract profile UUID
          PROFILE_UUID=$(security cms -D -i ~/Library/MobileDevice/Provisioning\ Profiles/eshop.mobileprovision 2>/dev/null | /usr/libexec/PlistBuddy -c "Print :UUID" /dev/stdin)
          echo "Profile UUID: $PROFILE_UUID"

          xcodebuild -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            -archivePath ../build/ios/Runner.xcarchive \
            DEVELOPMENT_TEAM=${TEAM_ID} \
            CODE_SIGN_STYLE=Manual \
            PROVISIONING_PROFILE_SPECIFIER="$PROFILE_UUID" \
            CODE_SIGN_IDENTITY="iPhone Distribution" \
            archive

          cat > ExportOptions.plist << PLISTEOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>${{ github.event.inputs.export_method || 'ad-hoc' }}</string>
            <key>teamID</key>
            <string>${TEAM_ID}</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.eshop.eshopFlutter</key>
              <string>$PROFILE_UUID</string>
            </dict>
            <key>signingCertificate</key>
            <string>iPhone Distribution</string>
          </dict>
          </plist>
          PLISTEOF

          xcodebuild -exportArchive \
            -archivePath ../build/ios/Runner.xcarchive \
            -exportPath ../build/ios/ipa \
            -exportOptionsPlist ExportOptions.plist

          echo "IPA built!"

      - name: Upload signed IPA
        if: env.HAS_CERT == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ios-signed
          path: build/ios/ipa/*.ipa
          retention-days: 30

    env:
      HAS_CERT: ${{ secrets.APPLE_CERTIFICATE_BASE64 != '' }}
